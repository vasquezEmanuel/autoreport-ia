name: autoreport-dev

services:
  # ── Base de datos ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: autoreport_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoreport_dev
      POSTGRES_USER: autoreport_user
      POSTGRES_PASSWORD: dev_password_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - autoreport_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoreport_user -d autoreport_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: autoreport_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://autoreport_user:dev_password_local@postgres:5432/autoreport_dev?schema=public
      JWT_SECRET: dev_jwt_secret_local_minimo_32_caracteres
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      UPLOAD_DIR: /app/uploads
      REPORTS_DIR: /app/reports
    volumes:
      - ./backend/src:/app/src
      # NUEVO — sincroniza prisma/ bidireccional: migraciones creadas en Docker
      # aparecen automáticamente en tu máquina para poder commitearlas a Git
      - ./backend/prisma:/app/prisma
      - /app/node_modules
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoreport_net
    command: npm run dev

volumes:
  postgres_data:
    name: autoreport_dev_postgres
  uploads_data:
    name: autoreport_dev_uploads
  reports_data:
    name: autoreport_dev_reports

networks:
  autoreport_net:
    name: autoreport_dev_network
    driver: bridge
