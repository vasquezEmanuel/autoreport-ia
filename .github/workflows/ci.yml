# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Pipeline de Integración Continua
#
# Se ejecuta automáticamente cuando:
#   - Alguien hace push a develop o main
#   - Alguien abre o actualiza un Pull Request hacia develop o main
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Lint y Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  NODE_VERSION: "20"

jobs:
  # ── JOB 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./backend
        run: npm ci

      - name: Correr ESLint
        working-directory: ./backend
        run: npm run lint

  # ── JOB 2: Tests ───────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    # Base de datos para los tests de integración
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoreport_test
          POSTGRES_USER: autoreport_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://autoreport_user:test_password@localhost:5432/autoreport_test?schema=public
      JWT_SECRET: ci_test_jwt_secret_32_characters_minimum
      ANTHROPIC_API_KEY: test_key_mocked
      UPLOAD_DIR: /tmp/ci_uploads
      REPORTS_DIR: /tmp/ci_reports

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./backend
        run: npm ci

      - name: Generar cliente Prisma
        working-directory: ./backend
        run: npx prisma generate

      - name: Aplicar migraciones en BD de test
        working-directory: ./backend
        run: npx prisma migrate deploy

      - name: Correr tests
        working-directory: ./backend
        run: npm test

  # ── JOB 3: Docker Build ────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verificar build de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: false
          tags: autoreport-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
